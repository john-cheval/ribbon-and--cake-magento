sources:
  - name: m2
    handler:
      graphql:
        endpoint: 'https://srv900162.hstgr.cloud/graphql'
        # Static schema file committed to git — build never introspects the live
        # Magento endpoint. Run `yarn generate-schema` locally whenever the
        # Magento schema changes (module installs, upgrades) then commit the file.
        source: './magento-schema.json'
        useGETForQueries: true
        batch: false
        retry: 3
        timeout: 30000
        operationHeaders:
          Store: 'default'
          Authorization: '{context.headers.authorization}'
          X-ReCaptcha: "{context.headers['x-recaptcha']}"
          Preview-Version: "{context.headers['preview-version']}"
          Content-Currency: "{context.headers['content-currency']}"
          X-Magento-Cache-Id: "{context.headers['x-magento-cache-id']}"
          X-Forwarded-For: "{context.headers['x-forwarded-for']}"
serve:
  playground: true
plugins:
  - '@graphcommerce/graphql-mesh/plugin/forward-headers':
      forwardHeaders:
        - X-Magento-Cache-Id
